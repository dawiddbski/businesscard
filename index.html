<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Card</title>
    <style>
        body{
            background: url(https://cdn.pixabay.com/photo/2019/10/20/12/53/usa-4563612_1280.jpg) no-repeat center center fixed;
            background-size:cover ;
        }
        .container{
            width: 400px ;
            margin:90px auto;
            padding: 30px;
            height: 160px;
            background-color: black;
            color: silver;
        }
        .business_card img{
            float: left;
        }

        .username, .email, .download-cv{
            text-align: center;
            font-family: 'open-sans', sans-serif;
            font-size: 20px;
        }
        .username span{
            border-bottom: 2px solid red;
            padding-bottom: 4px;
        }
        .email{
            font-size: 15px;
        }
        .download-cv a{
            color: red;
            font-size: 14px;
            text-decoration: none;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="business_card">
            <img src="https://randomuser.me/api/portraits/men/75.jpg" alt="User">
            
            <p class="username">
                <span>
                    Daniel Fargo
                </span>
            </p>
            
            <p class="email">
                <span>
                    daniel@example.com
                </span>
            </p>

            <p class="download-cv">
                <span>
                    <a href="#">Download CV</a>
                 </span>
        </p>
        </div>
    </div>
</body>
</html>
